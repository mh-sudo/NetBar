  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  
  <!-- Upload arrow (blue, going up) -->
  <path d="M148 330 L148 190" stroke="url(#blue)" stroke-width="36" stroke-linecap="round"/>
  <path d="M100 240 L148 190 L196 240" stroke="url(#blue)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Download arrow (green, going down) -->
  <path d="M316 182 L316 322" stroke="url(#green)" stroke-width="36" stroke-linecap="round"/>
  <path d="M268 272 L316 322 L364 272" stroke="url(#green)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
